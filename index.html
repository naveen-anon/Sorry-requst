<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I Am Sorry ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    color:white;
}

.container{
    margin-top:120px;
}

h1{
    font-size:50px;
}

p{
    font-size:22px;
    width:70%;
    margin:auto;
}

button{
    margin-top:30px;
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

.heart{
    position:fixed;
    color:red;
    font-size:20px;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh)}
    100%{transform:translateY(-10vh)}
}
</style>

</head>

<body>

<div class="container">

<h1>I'm Really Sorry ❤️</h1>

<p>
Mujhse galti ho gayi...  
Par sach bolu to tum meri life ki sabse important person ho.  
Main tumhe hurt karna kabhi nahi chahta tha.  
Please mujhe ek chance aur de do.  
I promise main better banunga. ❤️
</p>

<button onclick="forgive()">Please Forgive Me 🥺</button>

</div>

<script>

function forgive(){
alert("Yay! Thank you for forgiving me ❤️");
}

function createHeart(){
let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=Math.random()*20+10+"px";
heart.style.animationDuration=Math.random()*3+2+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
